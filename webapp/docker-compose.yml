version: "3.8"
services:
  db:
    image: postgres:latest
    container_name: "sweng-postgres"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=sweng
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d sweng-postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
